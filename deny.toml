# cargo-deny configuration — supply-chain gate for lmtt.
# Run locally with `cargo deny check`; CI runs it on PRs, pushes, and weekly.

[advisories]
version = 2
yanked = "deny"
# Add RUSTSEC IDs here (with a justifying comment) only if an advisory is
# confirmed not to affect us and a fix isn't yet available.
ignore = []

[licenses]
version = 2
# Permissive set actually present in the tree (see `cargo metadata`).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    # option-ext (pulled in by dirs) is MPL-2.0-only. File-level copyleft;
    # fine for an unmodified vendored dependency.
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The workspace's own crates (lmtt-core, lmtt-modules, ...) are path deps
# with no version — that's a "wildcard" to cargo-deny. Exempt local path
# deps; still catch a real `foo = "*"` registry wildcard.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# schema-tui (the TUI framework behind lmtt-config) is consumed straight
# from its git repo; it is our own code, pinned by Cargo.lock.
allow-git = ["https://github.com/MasonRhodesDev/schema-tui"]
